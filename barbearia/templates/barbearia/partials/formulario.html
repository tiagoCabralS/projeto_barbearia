<section class="secao secao-clara">
    <div class="secao-interno">
        <header class="secao-cabecalho">
            <h2 class="secao-titulo">{{ site_title }}Barbearia</h2>
        </header>
    </div>
    <form class="formulario" action="{{ form_action }}" method="POST">
        {% csrf_token %}
        <div class="form-content">
            {% for field in form %}
            <div class="formulario-grupo">
                {{ field }}
                <label class="formulario-rotulo" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {% if field.errors %}
                <div class="error">{{ field.errors }}</div>
                {% endif %}
                {% if field.help_text %}
                <p class="help-text">{{ field.help_text }}</p>
                {% endif %}
            </div>
            {% endfor %}
            {% if form.non_field_errors %}
            <div class="form-content">
                <div class="form-group">
                    <div class="message error">
                        {{ form.non_field_errors }}
                        <!-- Exibe mensagens de erro que não estão associadas a um campo específico -->
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
        <div class="form-content">
            <div class="form-group">
                <button class="formulario-botao" type="submit">Send</button>
            </div>
        </div>
    </form>
</section>
